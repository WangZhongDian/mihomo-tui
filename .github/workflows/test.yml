name: Test

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Unit and IPC integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...
